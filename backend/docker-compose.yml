services:
  rag-chatbot:
    build: .
    container_name: local-rag-chatbot
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data/documents:/app/data/documents
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
